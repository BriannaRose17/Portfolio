<!DOCTYPE html> 

<html lang="en"> 
    <a href="Project.html" class="back-btn">← Back to Projects</a>
<section id="dashboard">
     <link rel="stylesheet" href="Task.css">
  <h2>Productivity Dashboard</h2>

  
  <div class="progress-container">
    <div id="progressBar">0%</div>
  </div>


  <div class="input-group">
    <input type="text" id="taskInput" placeholder="What is your next goal?">
    
    <select id="taskPriority">
      <option value="high">High Priority</option>
      <option value="medium" selected>Medium Priority</option>
      <option value="low">Low Priority</option>
    </select>

    
<button type="button" onclick="addTask()" style="position: relative; z-index: 10;">Add Task</button>

  </div>


  <ul id="taskList"></ul>
</section>


 <script src="Function.js"></script>
</body>
</html>
