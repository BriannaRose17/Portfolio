<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second Brain</title>
    <link rel="stylesheet" href="ai.css">
</head>
<body>

    <a href="Project.html" class="back-btn">← Back to Projects</a>

    <main class="ai-container">
        <header class="ai-header">
            <h2>Second Brain</h2>
            <p>Access the world's most bizarre and fascinating data points.</p>
        </header>

        <div id="aiResponseArea" class="ai-chat-window"></div>

        <div class="ai-input-wrapper">
            <textarea id="aiPrompt" placeholder="Type 'Give me a fact' or 'Tell me something weird'..."></textarea>
            <button id="askBtn" onclick="queryAI()">Consult Brain ✨</button>
            <button id="randomBtn" onclick="getRandomFact()">Surprise Me! 🎲</button>
</div>
    </main>

    <script src="ai.js"></script>
</body>
</html>
